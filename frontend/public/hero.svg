<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2a5b"/>
      <stop offset="0.55" stop-color="#143a73"/>
      <stop offset="1" stop-color="#1f4e79"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- сетка/«схема» -->
  <g stroke="#9bc7ff" stroke-opacity="0.10" stroke-width="1.5">
    <path d="M0 220 H1600 M0 450 H1600 M0 680 H1600"/>
    <path d="M320 0 V900 M760 0 V900 M1180 0 V900"/>
  </g>

  <!-- «нейронные» связи -->
  <g stroke="url(#line)" stroke-width="2" fill="none" opacity="0.8">
    <path d="M120 760 C 380 600, 520 540, 760 450 S 1180 300, 1480 180"/>
    <path d="M80 520 C 360 470, 600 620, 900 560 S 1300 460, 1520 520"/>
  </g>

  <!-- узлы -->
  <g fill="#06b6d4">
    <circle cx="760" cy="450" r="9"/><circle cx="320" cy="220" r="6"/>
    <circle cx="1180" cy="680" r="6"/><circle cx="1180" cy="220" r="5"/>
    <circle cx="320" cy="680" r="5"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.85">
    <circle cx="1480" cy="180" r="5"/><circle cx="120" cy="760" r="5"/>
  </g>

  <!-- крупные мягкие круги -->
  <circle cx="1320" cy="240" r="180" fill="#06b6d4" fill-opacity="0.08"/>
  <circle cx="240" cy="700" r="220" fill="#ffffff" fill-opacity="0.04"/>
</svg>
